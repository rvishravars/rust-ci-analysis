services:
  collector:
    build:
      context: .
      dockerfile: Dockerfile
    image: rust-ci-collector:latest
    env_file:
      - .env
    volumes:
      - ./data:/data
    # By default this runs `python -m collector` from the Dockerfile
    # You can override or add arguments, e.g.:
    # command: ["--limit", "10", "--resume"]
